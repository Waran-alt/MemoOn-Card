# Deploy on push to main/master: Hostinger VPS builds and runs the stack from a compose file.
#
# Default compose is docker-compose.prod.yml (postgres + backend + frontend only). Rebuilding images
# alongside Loki/Prometheus/Grafana on a small VPS often triggers OOM (kernel may kill e.g. loki).
# To deploy app + observability, set Repository variable HOSTINGER_COMPOSE_FILE=docker-compose.deploy.yml
# (recommend ≥4 GB RAM, or add swap). See documentation/DEPLOYMENT-HOSTINGER.md.
#
# One-time setup: Settings → Secrets and variables → Actions → Repository (not Environment).
# - Secrets: HOSTINGER_API_KEY, POSTGRES_PASSWORD, JWT_SECRET, GRAFANA_ADMIN_PASSWORD (if using deploy.yml + Grafana)
#   optional: DEV_EMAIL, DEV_PASSWORD, DEV_USERNAME
# - Variables: HOSTINGER_VM_ID, NEXT_PUBLIC_API_URL, CORS_ORIGIN; optional: POSTGRES_DB, POSTGRES_USER,
#   HOSTINGER_COMPOSE_FILE, GRAFANA_ROOT_URL (public Grafana URL, e.g. https://grafana.example.com — no trailing slash)
# If NEXT_PUBLIC_API_URL / CORS_ORIGIN are in Secrets instead of Variables, they stay empty
# because this workflow uses vars.* for them. See documentation/DEPLOYMENT-HOSTINGER.md.

name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release label
        id: rel
        run: echo "label=$(node scripts/product-release-label.cjs)" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Deploy to Hostinger VPS
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID }}
          project-name: memoon-card
          docker-compose-path: ${{ vars.HOSTINGER_COMPOSE_FILE || 'docker-compose.prod.yml' }}
          environment-variables: |
            NODE_ENV=production
            GIT_SHA=${{ github.sha }}
            RELEASE_LABEL=${{ steps.rel.outputs.label }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            CORS_ORIGIN=${{ vars.CORS_ORIGIN }}
            POSTGRES_DB=${{ vars.POSTGRES_DB }}
            POSTGRES_USER=${{ vars.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_ACCESS_EXPIRES_IN=${{ vars.JWT_ACCESS_EXPIRES_IN }}
            JWT_REFRESH_EXPIRES_IN=${{ vars.JWT_REFRESH_EXPIRES_IN }}
            DEV_EMAIL=${{ secrets.DEV_EMAIL }}
            DEV_PASSWORD=${{ secrets.DEV_PASSWORD }}
            DEV_USERNAME=${{ secrets.DEV_USERNAME }}
            GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
            GRAFANA_ROOT_URL=${{ vars.GRAFANA_ROOT_URL }}
