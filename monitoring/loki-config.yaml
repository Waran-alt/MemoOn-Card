# Single-node Loki (filesystem). Tune limits_config.retention_period as needed.
# delete_request_store must be a storage client name (e.g. named filesystem store), not a path.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 0

common:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory
  replication_factor: 1
  path_prefix: /loki

schema_config:
  configs:
    - from: 2020-05-15
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  filesystem:
    directory: /loki/chunks
  named_stores:
    filesystem:
      delete_requests:
        directory: /loki/delete-requests

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: delete_requests

limits_config:
  retention_period: 336h
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
