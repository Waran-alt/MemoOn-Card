# Prometheus scrape config (Docker). Backend target resolves when monitoring compose is merged with app compose (same project network).

global:
  # 30s reduces CPU/disk vs 15s on small VPS; tighten in prometheus.yml if needed.
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: memoon_backend
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:4002']
