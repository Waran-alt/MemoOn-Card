# Docker log discovery; push to Loki. Needs /var/run/docker.sock on the host.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    timeout: 30s
    batchwait: 1s

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: '/memoon-card-(backend|frontend|postgres)(-prod)?'
        action: keep
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: service_name
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
      - target_label: job
        replacement: docker
    pipeline_stages:
      - docker: {}
